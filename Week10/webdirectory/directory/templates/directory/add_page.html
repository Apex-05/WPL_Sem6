<!DOCTYPE html>
<html>
<head>
    <title>Add Page</title>

    <style>
        body { font-family:'Segoe UI'; background:#eef2f7; }

        .box {
            width:40%;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }

        input, select {
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .btn {
            width:100%;
            padding:12px;
            background:#06b6d4;
            color:white;
            border:none;
            border-radius:6px;
        }

        .btn:hover { background:#0891b2; }
    </style>
</head>

<body>

<div class="box">
    <h2>Add Page</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn">Submit</button>
    </form>
</div>

</body>
</html>
