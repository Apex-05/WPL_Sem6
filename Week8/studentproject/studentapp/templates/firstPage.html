<!DOCTYPE html>
<html>
<head>
    <title>First Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Student Form</h2>

        <form method="post">
            {% csrf_token %}

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Reg No.</label>
            <input type="text" name="roll" required>

            <label>Subject</label>
            <select name="subject">
                <option value="FLAT">FLAT</option>
                <option value="DSA">DSA</option>
                <option value="DSCO">DSCO</option>
                <option value="Web Dev">Web Dev</option>
                <option value="OOPs">OOPs</option>
                <option value="Cyber Security">Cyber Security</option>


            </select>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
