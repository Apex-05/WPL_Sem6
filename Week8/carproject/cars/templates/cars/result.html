<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Selection Result</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .result-container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .success-icon {
            width: 60px;
            height: 60px;
            background-color: #e7f3ff;
            color: #4a90e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }

        h2 {
            color: #333;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .detail-box {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            text-align: left;
            border-left: 4px solid #4a90e2;
        }

        .label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 4px;
        }

        .value {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #2c3e50;
            text-decoration: underline;
        }

        .result-container {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="result-container">
        <div class="success-icon">✓</div>
        
        <h2>Selection Confirmed</h2>

        <div class="detail-box">
            <span class="label">Manufacturer</span>
            <span class="value">{{ manufacturer }}</span>
        </div>

        <div class="detail-box">
            <span class="label">Model</span>
            <span class="value">{{ model }}</span>
        </div>

        <a href="{% url 'index' %}" class="back-link">← Choose another car</a>
    </div>

</body>
</html>
